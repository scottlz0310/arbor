name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Rust: lint ──────────────────────────────────────────────────────────────
  # Runs in parallel with rust-coverage.
  # cargo check is omitted: clippy subsumes it.
  rust-lint:
    name: Rust clippy
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry (shared)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target (lint)
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-lint-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-target-lint-

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  # ── Rust: test + coverage ───────────────────────────────────────────────────
  # Runs in parallel with rust-lint.
  rust-coverage:
    name: Rust test + coverage
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install dsx CLI
        shell: pwsh
        run: |
          $ver = "0.2.3"
          $expectedHash = "95cb615947f88fd57b9c78487a99c3e4db5970c99675a30a872783448e11958e"
          $url = "https://github.com/scottlz0310/dsx/releases/download/v${ver}/dsx_${ver}_windows_amd64.zip"
          $zipPath = Join-Path $env:TEMP "dsx.zip"
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          $fileHash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($fileHash -ne $expectedHash) {
            Write-Error "SHA256 mismatch: expected $expectedHash but got $fileHash"
            exit 1
          }
          $extractPath = Join-Path $env:TEMP "dsx"
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          echo $extractPath >> $env:GITHUB_PATH

      - name: Cache cargo registry (shared)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target (coverage)
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-cov-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-target-cov-

      - name: cargo test with coverage
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload Rust coverage to Codecov
        # fork PRs do not have access to secrets; skip upload in that case
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: src-tauri/lcov.info
          flags: rust
          fail_ci_if_error: false

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend typecheck / build / test / coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        env:
          TAURI_ENV_TARGET_TRIPLE: x86_64-unknown-linux-gnu

      - name: Unit tests with coverage
        run: pnpm run test:coverage

      - name: Upload frontend coverage to Codecov
        # fork PRs do not have access to secrets; skip upload in that case
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
